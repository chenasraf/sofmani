# To use on your manifest:
#   - name: tldr
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/tldr.yml
install:
  - name: tldr
    type: group
    steps:
      - name: tldr
        type: brew
        platforms:
          only: ['macos']
      - name: tldr
        type: npm
        platforms:
          only: ['linux']
