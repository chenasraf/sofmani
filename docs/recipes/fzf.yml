# To use on your manifest:
#   - name: fzf
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/fzf.yml
install:
  - name: fzf
    type: group
    steps:
      - name: fzf
        type: brew
        platforms:
          only: ['macos']
      - name: fzf
        type: github-release
        platforms:
          only: ['linux']
        opts:
          repository: junegunn/fzf
          strategy: tar
          destination: ~/.local/bin
          download_filename: fzf-{{ .Version }}-linux_{{ .Arch }}.tar.gz
