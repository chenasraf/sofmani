# To use on your manifest:
#   - name: jq
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/jq.yml
install:
  - name: jq
    type: group
    steps:
      - name: jq
        type: brew
        platforms:
          only: ['macos']
      - name: jq
        type: github-release
        platforms:
          only: ['linux']
        opts:
          repository: jqlang/jq
          destination: ~/.local/bin
          download_filename: jq-linux-{{ .Arch }}
