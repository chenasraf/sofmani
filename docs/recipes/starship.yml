# To use on your manifest:
#   - name: starship
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/starship.yml
install:
  - name: starship
    type: group
    steps:
      - name: starship
        type: brew
        platforms:
          only: ['macos']
      - name: starship
        type: github-release
        platforms:
          only: ['linux']
        opts:
          repository: starship/starship
          strategy: tar
          destination: ~/.local/bin
          download_filename: starship-{{ .ArchGnu }}-unknown-linux-musl.tar.gz
