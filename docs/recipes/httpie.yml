# To use on your manifest:
#   - name: httpie
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/httpie.yml
install:
  - name: httpie
    bin_name: http
    type: group
    steps:
      - name: httpie
        bin_name: http
        type: brew
        platforms:
          only: ['macos']
      - name: httpie
        bin_name: http
        type: pipx
        platforms:
          only: ['linux']
