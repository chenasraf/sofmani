# To use on your manifest:
#   - name: direnv
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/direnv.yml
install:
  - name: direnv
    type: group
    steps:
      - name: direnv
        type: brew
        platforms:
          only: ['macos']
      - name: direnv
        type: github-release
        platforms:
          only: ['linux']
        opts:
          repository: direnv/direnv
          destination: ~/.local/bin
          download_filename: direnv.linux-{{ .Arch }}
