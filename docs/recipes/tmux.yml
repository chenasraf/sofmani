# To use on your manifest:
#   - name: tmux
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/tmux.yml
install:
  - name: tmux
    type: group
    steps:
      - name: tmux
        type: brew
        platforms:
          only: ['macos']
      - name: tmux
        type: apt
        platforms:
          only: ['linux']
