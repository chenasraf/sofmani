# To use on your manifest:
#   - name: neovim
#     type: manifest
#     opts:
#       source: git@github.com/chenasraf/sofmani.git
#       path: docs/recipes/neovim.yml
install:
  - name: neovim
    bin_name: nvim
    type: group
    steps:
      - name: neovim
        bin_name: nvim
        type: brew
        platforms:
          only: ['macos']
      - name: nvim
        type: github-release
        platforms:
          only: ['linux']
        opts:
          repository: neovim/neovim
          destination: ~/.local/bin
          download_filename: nvim-linux-{{ .ArchAlias }}.appimage
